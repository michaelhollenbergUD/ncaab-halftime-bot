name: Basketball Under 10 Min Monitor

on:
  workflow_dispatch: # Allows manual trigger and API trigger

jobs:
  check-halftime:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Check for basketball games under 10 minutes
      run: |
        # Get today's and yesterday's dates in Eastern Time (YYYYMMDD format)
        TODAY=$(TZ='America/New_York' date +%Y%m%d)
        YESTERDAY=$(TZ='America/New_York' date -d 'yesterday' +%Y%m%d)
        
        # Fetch ESPN scoreboard for NCAAB (today and yesterday)
        echo "Fetching NCAAB games..."
        curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=50&dates=$TODAY" > ncaab_today.json
        curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=50&dates=$YESTERDAY" > ncaab_yesterday.json
        
        # Fetch ESPN scoreboard for NBA (today and yesterday)
        echo "Fetching NBA games..."
        curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=$TODAY" > nba_today.json
        curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=$YESTERDAY" > nba_yesterday.json
        
        # Create state file if it doesn't exist
        touch alerted_games.txt
        
        cat << 'EOF' > check_halftime.py
        import json
        import os
        import urllib.request
        import urllib.parse
        from datetime import datetime
        
        # Read both NCAAB and NBA games from today and yesterday
        all_games = []
        
        files = [
            ('ncaab_today.json', 'NCAAB'),
            ('ncaab_yesterday.json', 'NCAAB'),
            ('nba_today.json', 'NBA'),
            ('nba_yesterday.json', 'NBA')
        ]
        
        for filename, league_name in files:
            try:
                with open(filename, 'r') as f:
                    data = json.load(f)
                    if 'events' in data:
                        for event in data['events']:
                            event['league'] = league_name
                            all_games.append(event)
            except Exception as e:
                print(f"Error reading {filename}: {e}")
        
        # Read previously alerted games
        alerted_games = set()
        try:
            with open('alerted_games.txt', 'r') as f:
                content = f.read().strip()
                if content:
                    alerted_games = set(content.split(','))
        except:
            pass
        
        # Get current date for daily reset
        current_date = datetime.now().strftime('%Y%m%d')
        
        # Filter out old alerts (from previous days)
        alerted_games = {g for g in alerted_games if g.startswith(current_date)}
        
        # Check for games under 10 minutes in 2nd half/4th quarter
        halftime_games = []
        
        # Debug output
        print(f"\n🏀 Basketball Games Summary:")
        print(f"Total games found: {len(all_games)}")
        if all_games:
            print(f"\nAll games in response:")
            for event in all_games:
                try:
                    league = event.get('league', 'Unknown')
                    competition = event['competitions'][0]
                    status_detail = competition['status']['type']['detail']
                    home_team = next((t for t in competition['competitors'] if t['homeAway'] == 'home'), None)
                    away_team = next((t for t in competition['competitors'] if t['homeAway'] == 'away'), None)
                    if home_team and away_team:
                        print(f"  [{league}] {away_team['team']['displayName']} @ {home_team['team']['displayName']} [{status_detail}]")
                except:
                    pass
        
        for event in all_games:
            try:
                game_id = event['id']
                league = event.get('league', 'NCAAB')
                competition = event['competitions'][0]
                status = competition['status']['type']['name']
                status_detail = competition['status']['type']['detail']
                display_clock = competition['status'].get('displayClock', '')
                period = competition['status'].get('period', 0)
                
                # Create unique daily key (date + game_id)
                daily_game_key = f"{current_date}_{game_id}"
                
                # Check if game is in 2nd half (NCAAB period 2) or 4th quarter (NBA period 4)
                # AND has less than 10 minutes left
                is_final_period = (league == 'NCAAB' and period == 2) or (league == 'NBA' and period == 4)
                is_in_progress = status == 'STATUS_IN_PROGRESS'
                
                # Parse clock time (format is usually "MM:SS" like "9:45" or "5:23")
                time_under_10_min = False
                if display_clock and ':' in display_clock:
                    try:
                        parts = display_clock.split(':')
                        minutes = int(parts[0])
                        time_under_10_min = minutes < 10
                    except:
                        pass
                
                if is_final_period and is_in_progress and time_under_10_min and daily_game_key not in alerted_games:
                    home_team = next((t for t in competition['competitors'] if t['homeAway'] == 'home'), None)
                    away_team = next((t for t in competition['competitors'] if t['homeAway'] == 'away'), None)
                    
                    if home_team and away_team:
                        game = {
                            'id': game_id,
                            'daily_key': daily_game_key,
                            'league': league,
                            'away_team': away_team['team']['displayName'],
                            'away_score': away_team['score'],
                            'home_team': home_team['team']['displayName'],
                            'home_score': home_team['score'],
                            'broadcast': competition.get('broadcasts', [{}])[0].get('names', ['No TV info'])[0] if competition.get('broadcasts') else 'No TV info',
                            'time_remaining': display_clock
                        }
                        halftime_games.append(game)
                        alerted_games.add(daily_game_key)
                        
                        # Immediately save to file after adding to prevent duplicates in same run
                        with open('alerted_games.txt', 'w') as f:
                            f.write(','.join(sorted(alerted_games)))
            except Exception as e:
                print(f"Error processing game: {e}")
        
        # Send notifications for each game under 10 minutes
        webhook_url = os.environ.get('SLACK_WEBHOOK_URL')
        
        if halftime_games and webhook_url:
            for game in halftime_games:
                # Create Slack message with rich formatting
                league_emoji = "🏀" if game['league'] == 'NCAAB' else "🏀"
                slack_message = {
                    "text": f"{league_emoji} {game['league']} UNDER 10 MIN: {game['away_team']} {game['away_score']} - {game['home_score']} {game['home_team']} ({game['time_remaining']} left)",
                    "blocks": [
                        {
                            "type": "header",
                            "text": {
                                "type": "plain_text",
                                "text": f"{league_emoji} {game['league']} - UNDER 10 MINUTES",
                                "emoji": True
                            }
                        },
                        {
                            "type": "section",
                            "fields": [
                                {
                                    "type": "mrkdwn",
                                    "text": f"*{game['away_team']}*\n{game['away_score']} points"
                                },
                                {
                                    "type": "mrkdwn",
                                    "text": f"*{game['home_team']}*\n{game['home_score']} points"
                                }
                            ]
                        },
                        {
                            "type": "context",
                            "elements": [
                                {
                                    "type": "mrkdwn",
                                    "text": f"⏱️ {game['time_remaining']} remaining • 📺 {game['broadcast']}"
                                }
                            ]
                        }
                    ]
                }
                
                # Send to Slack
                req = urllib.request.Request(
                    webhook_url,
                    data=json.dumps(slack_message).encode('utf-8'),
                    headers={'Content-Type': 'application/json'}
                )
                
                try:
                    with urllib.request.urlopen(req) as response:
                        print(f"✓ Sent notification: {game['away_team']} vs {game['home_team']}")
                except Exception as e:
                    print(f"✗ Error sending notification: {e}")
        else:
            print(f"\nNo NEW games under 10 minutes right now.")
        
        # Save updated alerted games
        with open('alerted_games.txt', 'w') as f:
            f.write(','.join(sorted(alerted_games)))
        
        print(f"\nAlerted games today: {len(alerted_games)}")
        EOF
        
        # Run the Python script
        python3 check_halftime.py
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Commit state file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add alerted_games.txt || true
        git commit -m "Update alerted games state [skip ci]" || true
        git push || true
